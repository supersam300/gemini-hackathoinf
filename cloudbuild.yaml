substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: simuide
  _REPO_NAME: simuide
  _IMAGE_NAME: web
  _ALLOW_UNAUTHENTICATED: "true"
  _GEMINI_AGENT_MODEL: gemini-2.5-flash
  _GEMINI_API_KEY_SECRET: GEMINI_API_KEY
  _MONGODB_URI_SECRET: MONGODB_URI

steps:
  - id: Build image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest
      - .

  - id: Push commit image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$SHORT_SHA

  - id: Push latest image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest

  - id: Deploy Cloud Run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated=${_ALLOW_UNAUTHENTICATED}
      - --set-env-vars=NODE_ENV=production,PORT=3000,GEMINI_AGENT_MODEL=${_GEMINI_AGENT_MODEL}
      - --set-secrets=GEMINI_API_KEY=${_GEMINI_API_KEY_SECRET}:latest,MONGODB_URI=${_MONGODB_URI_SECRET}:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:latest

timeout: 3600s
